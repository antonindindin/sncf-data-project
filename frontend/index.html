<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Data Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo">SNCF DataHub</div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">À Propos</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="apps-grid">
                <div class="app-card" onclick="loadApp('gares')">
                    <span class="app-icon">🏛️</span>
                    <h3>Gares & Villes</h3>
                </div>
                <div class="app-card" onclick="loadApp('reseau')">
                    <span class="app-icon">🛤️</span>
                    <h3>Réseau Ferré</h3>
                </div>
                <div class="app-card" onclick="loadApp('frequentation')">
                    <span class="app-icon">👥</span>
                    <h3>Fréquentation</h3>
                </div>
                <div class="app-card" onclick="loadApp('tarifs')">
                    <span class="app-icon">💶</span>
                    <h3>Comparateur Tarifs</h3>
                </div>
            </div>

            <div id="app-container"></div>
        </main>
    </div>

    <script src="frequentation.js"></script>
    <script src="script.js"></script>
    
    <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKrNmp_0-GgnP7A0cR4Zriii4zH_16rVc&callback=initMap&libraries=visualization">
    </script>
</body>
</html>
