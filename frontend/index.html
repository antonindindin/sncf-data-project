<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Data Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo">SNCF DataHub</div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">À Propos</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="apps-grid">
                <div id="btn-gares" class="app-card" onclick="loadApp('gares')">
                    <span class="app-icon">🏛️</span>
                    <h3>Gares & Villes</h3>
                </div>
                <div id="btn-reseau" class="app-card" onclick="loadApp('reseau')">
                    <span class="app-icon">🛤️</span>
                    <h3>Réseau Ferré</h3>
                </div>
                <div id="btn-frequentation" class="app-card" onclick="loadApp('frequentation')">
                    <span class="app-icon">👥</span>
                    <h3>Fréquentation</h3>
                </div>
                <div id="btn-tarifs" class="app-card" onclick="loadApp('tarifs')">
                    <span class="app-icon">💶</span>
                    <h3>Comparateur Tarifs</h3>
                </div>
            </div>

            <div id="app-container"></div>

            <div id="map-legend" class="map-legend">
                <h4>Légende</h4>
                <div class="legend-item"><span class="legend-dot" style="background:#E20074;"></span>Gare Nationale / TGV</div>
                <div class="legend-item"><span class="legend-dot" style="background:#0088CE;"></span>Gare Régionale</div>
                <div class="legend-item"><span class="legend-dot" style="background:#6C757D;"></span>Gare Locale</div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
                <div class="legend-item"><span class="legend-line" style="background:#E20074;"></span>Ligne LGV</div>
                <div class="legend-item"><span class="legend-line" style="background:#0055A4;"></span>Ligne Classique</div>
            </div>
        </main>
    </div>

    <!-- Scripts locaux -->
    <script src="script.js"></script>
    <script src="frequentation.js"></script>
    
    <!-- Script de l'API Google Maps (asynchrone) -->
    <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKrNmp_0-GgnP7A0cR4Zriii4zH_16rVc&callback=initMap&libraries=visualization">
    </script>
</body>
</html>
